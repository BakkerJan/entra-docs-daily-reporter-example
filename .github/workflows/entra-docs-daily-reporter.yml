name: Entra Docs Daily Reporter

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest

    env:
      TZ: Europe/Amsterdam
      LOOKBACK_HOURS: "24"
      REPORT_OUTPUT: "report-output/entra-daily-report.html"
      ISSUE_OUTPUT: "report-output/entra-daily-report.md"
      REPORT_METADATA_OUTPUT: "report-output/entra-daily-report.json"
      ISSUE_LABEL: "entra-docs-report"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci
        working-directory: tools/entra-docs-reporter

      - name: Generate report files
        run: npm run report
        working-directory: tools/entra-docs-reporter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update daily issue
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const issueBodyPath = path.join('tools/entra-docs-reporter', process.env.ISSUE_OUTPUT);
            const metadataPath = path.join('tools/entra-docs-reporter', process.env.REPORT_METADATA_OUTPUT);
            const issueBody = fs.readFileSync(issueBodyPath, 'utf8');
            const metadata = JSON.parse(fs.readFileSync(metadataPath, 'utf8'));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = metadata.label || process.env.ISSUE_LABEL;

            const labelsResponse = await github.rest.issues.listLabelsForRepo({ owner, repo, per_page: 100 });
            const hasLabel = labelsResponse.data.some(l => l.name === label);
            if (!hasLabel) {
              await github.rest.issues.createLabel({ owner, repo, name: label, color: '0e8a16', description: 'Automated Entra docs report issues' });
            }

            const title = metadata.title;
            const found = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue in:title \"${title}\"`
            });

            if (found.data.items.length > 0) {
              const issueNumber = found.data.items[0].number;
              const issueBodyForComment = issueBody.trim();
              const notificationComment = [
                `Daily report refresh for ${metadata.title}.`,
                '',
                `The issue body was updated with the latest 24-hour report (${metadata.total24h} items).`,
                '',
                '---',
                '',
                issueBodyForComment
              ].join('\n');
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                title,
                body: issueBody,
                labels: [label]
              });
              try {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: notificationComment
                });
              } catch (error) {
                core.error(`Failed to post refresh comment on issue #${issueNumber}: ${error.message}`);
                throw error;
              }
              core.info(`Updated issue #${issueNumber}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body: issueBody,
                labels: [label]
              });
              core.info(`Created issue #${created.data.number}`);
            }

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v6
        with:
          name: entra-daily-report
          path: |
            tools/entra-docs-reporter/report-output/entra-daily-report.html
            tools/entra-docs-reporter/report-output/entra-daily-report.md
            tools/entra-docs-reporter/report-output/entra-daily-report.json
